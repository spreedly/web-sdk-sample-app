<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spreedly Hosted Fields Demo</title>
    <link rel="stylesheet" href="./css/hostedFields.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>

  <body>
    <div class="container" data-testid="hosted-fields-container">
      <main class="main-content" data-testid="hosted-fields-main">
        <div
          class="payment-form-container"
          data-testid="payment-form-container"
        >
          <!-- Form header -->
          <div class="form-header" data-testid="form-header">
            <h2 class="form-title" data-testid="form-title">
              Hosted Fields Payment Demo
            </h2>

            <div class="options">
              <button
                data-testid="btn-restart-hosted-fields"
                type="button"
                class="btn-restart"
                id="restart-btn"
              >
                RESTART HOSTED FIELDS
              </button>
              <label class="checkbox">
                <input
                  type="checkbox"
                  id="allow_blank_name"
                  data-testid="allow-blank-name"
                />
                Allow blank name
              </label>
              <label class="checkbox">
                <input
                  type="checkbox"
                  id="allow_expired_date"
                  data-testid="allow-expired-date"
                />
                Allow expired date
              </label>
              <label class="checkbox">
                <input
                  type="checkbox"
                  id="two_digit_expiry"
                  data-testid="two-digit-expiry"
                />
                2 digit expiry (MM/YY)
              </label>
            </div>
            <h3
              class="auth-title"
              id="token-container-message"
              style="color: green"
            ></h3>
          </div>

          <form
            id="card-details-form"
            onsubmit="handlePaymentFormSubmit(event)"
            data-testid="card-details-form"
          >
            <!-- Personal Information Section -->
            <div class="form-section" data-testid="personal-info-section">
              <h3 class="section-title" data-testid="personal-info-title">
                Personal Information
              </h3>
              <div class="row" data-testid="name-row">
                <div class="input-group" data-testid="input-group-first-name">
                  <label
                    for="first-name"
                    class="input-label"
                    data-testid="label-first-name"
                    >First Name</label
                  >
                  <input
                    type="text"
                    id="first-name"
                    name="first-name"
                    class="form-input"
                    placeholder="Enter first name"
                    data-testid="input-first-name"
                    maxlength="350"
                  />
                  <div class="error-message" id="first-name-error"></div>
                </div>
                <div class="input-group" data-testid="input-group-last-name">
                  <label
                    for="last-name"
                    class="input-label"
                    data-testid="label-last-name"
                    >Last Name</label
                  >
                  <input
                    type="text"
                    id="last-name"
                    name="last-name"
                    class="form-input"
                    placeholder="Enter last name"
                    data-testid="input-last-name"
                    maxlength="350"
                  />
                  <div class="error-message" id="last-name-error"></div>
                </div>
              </div>
              <div class="row" data-testid="address-row">
                <div
                  class="input-group"
                  data-testid="input-group-shipping-address"
                >
                  <label
                    for="shipping-address1"
                    class="input-label"
                    data-testid="label-shipping-address"
                    >Shipping Address</label
                  >
                  <input
                    type="text"
                    id="shipping-address1"
                    name="shipping_address1"
                    class="form-input"
                    placeholder="Enter shipping address"
                    value=""
                    data-testid="input-shipping-address"
                    maxlength="350"
                  />
                  <div class="error-message" id="shipping-address1-error"></div>
                </div>
              </div>
            </div>

            <hr class="divider" data-testid="form-divider" />

            <!-- Payment Details Section -->
            <div class="form-section" data-testid="payment-details-section">
              <h3 class="section-title" data-testid="payment-details-title">
                Payment Details
              </h3>
              <div class="row" data-testid="card-row">
                <div class="input-group" data-testid="input-group-card-number">
                  <label
                    for="spreedly-number-input-container"
                    class="input-label"
                    data-testid="label-card-number"
                    >Credit Card Number</label
                  >
                  <div
                    id="spreedly-number-input-container"
                    class="hosted-field"
                    data-testid="hosted-field-card-number"
                  ></div>
                </div>
                <div class="input-group" data-testid="input-group-cvv">
                  <label
                    for="spreedly-cvv-input-container"
                    class="input-label"
                    data-testid="label-cvv"
                    >CVV</label
                  >
                  <div
                    id="spreedly-cvv-input-container"
                    class="hosted-field"
                    data-testid="hosted-field-cvv"
                  ></div>
                </div>
              </div>
              <div class="row" data-testid="expiry-row">
                <div
                  class="input-group expiry-group"
                  data-testid="input-group-expiry"
                >
                  <label class="input-label" data-testid="label-expiry"
                    >Expiration Date</label
                  >
                  <div class="expiry-fields" data-testid="expiry-fields">
                    <div class="expiry-field-container">
                      <input
                        type="text"
                        id="expiry-month"
                        name="expiry-month"
                        class="form-input"
                        maxlength="2"
                        placeholder="MM"
                        data-testid="input-expiry-month"
                      />
                      <div class="error-message" id="expiry-month-error"></div>
                    </div>
                    <span
                      class="slash"
                      id="expiry-slash"
                      data-testid="expiry-slash"
                      >/</span
                    >
                    <div class="expiry-field-container">
                      <input
                        type="text"
                        id="expiry-year"
                        name="expiry-year"
                        class="form-input"
                        maxlength="4"
                        placeholder="YYYY"
                        data-testid="input-expiry-year"
                      />
                      <div class="error-message" id="expiry-year-error"></div>
                    </div>
                  </div>
                  <div
                    class="expiry-single"
                    id="expiry-single"
                    style="display: none"
                  >
                    <input
                      type="text"
                      id="expiry-mm-yy"
                      name="expiry-mm-yy"
                      class="form-input"
                      placeholder="MM/YY"
                      maxlength="5"
                    />
                  </div>
                  <div class="error-message" id="expiry-error"></div>
                </div>
              </div>
            </div>

            <!-- General form error container -->
            <div class="error-message form-error" id="form-error"></div>

            <button
              type="submit"
              class="submit-btn"
              id="submit-payment-btn"
              data-testid="submit-payment-btn"
            >
              Submit Payment
            </button>
          </form>
        </div>
      </main>
    </div>

    <script>
      async function fetchAuthParams() {
        try {
          const response = await axios.get(
            'https://checkout-web-sample-app-049a3c617015.herokuapp.com/api/v1/auth/params'
          );
          const authParams = {...response.data, token: response.data.certificateToken, 'env-key': '0RMACG59RG8VQ9A4G09QDD3F1Q'};
          delete authParams.certificateToken;
          window.sessionStorage.setItem('authParams', JSON.stringify(authParams));
        } catch (error) {
          console.error('Error fetching auth params:', error);
          throw error; // Re-throw to prevent SDK loading on error
        }
      }
    
      async function initializeSDK() {
        try {
          // Ensure auth params exist before loading SDK
          if (!window.sessionStorage.getItem('authParams')) {
            await fetchAuthParams();
          }
    
          // Load SDK script after auth params are ready
          return new Promise((resolve, reject) => {
            
            const sdkScript = document.createElement('script');
            sdkScript.src = 'https://core-test.spreedly.com/checkout/sdk/rc/index.js';
            sdkScript.onload = () => {
              console.log('SDK loaded successfully');
              // Load hosted fields script after SDK is ready
              const hostedFieldsScript = document.createElement('script');
              hostedFieldsScript.src = './scripts/hostedFields.js';
              hostedFieldsScript.onload = () => {
                console.log('Hosted fields initialized successfully');
                resolve();
              };
              document.head.appendChild(hostedFieldsScript);
            };
            sdkScript.onerror = () => reject(new Error('Failed to load SDK script'));
            document.head.appendChild(sdkScript);
          });
        } catch (error) {
          console.error('Failed to initialize SDK:', error);
          // Show user-friendly error message
          document.body.innerHTML = '<div style="padding: 20px; color: red; text-align: center;"><h2>Failed to load payment form</h2><p>Please refresh the page and try again.</p></div>';
        }
      }
    
      // Initialize when DOM is ready
      document.addEventListener('DOMContentLoaded', function() {
        initializeSDK();
      });
    </script>
    
    <script>
      const tokenContainer = document.getElementById('token-container');
      const tokenContainerError = document.getElementById(
        'token-container-error'
      );
    </script>
  </body>
</html>
