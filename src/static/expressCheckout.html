<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Express Checkout</title>
  <style>
    .checkout-plugin {
      height: 650px !important;
      width: 500px !important;
    }

    #token-container {
      font-size: 22px;
      color: green;
      padding: 16px;
      display: none;
    }

    #token-container-error {
      font-size: 22px;
      color: red;
      padding: 16px;
      display: none;
    }
  </style>
</head>

<body>
  <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
    <div id="token-container"></div>
    <div id="token-container-error"></div>
    <button id="express-checkout" style="padding: 16px; font-size: 16px; cursor: pointer;">Express checkout</button>
  </div>
</body>
<script src="../dist/index.js"></script>
<script src="../dist/expressCheckout.js"></script>

</html>
