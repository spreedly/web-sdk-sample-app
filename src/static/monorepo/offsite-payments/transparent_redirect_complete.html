<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Payment | Spreedly Web SDK Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../shared/utils.js"></script>
  <style>
    .processing-container {
      max-width: 500px;
      margin: 0 auto;
    }
    
    .processing-card {
      background: white;
      border-radius: 16px;
      padding: 3rem 2rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    
    .processing-card.error {
      border-top: 4px solid var(--color-error, #ef4444);
    }
    
    .processing-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      background: var(--color-gray-100);
    }
    
    .processing-icon.loading {
      background: var(--color-primary-light, #e0e7ff);
    }
    
    .processing-icon.error {
      background: var(--color-error-light, #fee2e2);
      color: var(--color-error, #ef4444);
    }
    
    .processing-icon svg {
      width: 40px;
      height: 40px;
    }
    
    .spinner-large {
      width: 40px;
      height: 40px;
      border: 3px solid var(--color-gray-200);
      border-top-color: var(--color-primary, #0a0a0a);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .processing-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--color-gray-900);
    }
    
    .processing-title.error {
      color: var(--color-error, #ef4444);
    }
    
    .processing-message {
      color: var(--color-gray-500);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    
    .progress-steps {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      text-align: left;
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--color-gray-50);
      border-radius: 8px;
    }
    
    .progress-step {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.875rem;
      color: var(--color-gray-500);
    }
    
    .progress-step.active {
      color: var(--color-gray-900);
      font-weight: 500;
    }
    
    .progress-step.completed {
      color: var(--color-success, #10b981);
    }
    
    .step-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      background: var(--color-gray-200);
      color: var(--color-gray-500);
    }
    
    .step-icon.active {
      background: var(--color-primary, #0a0a0a);
      color: white;
    }
    
    .step-icon.completed {
      background: var(--color-success, #10b981);
      color: white;
    }
    
    .error-details {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--color-error-light, #fee2e2);
      border-radius: 8px;
      font-size: 0.875rem;
      color: var(--color-error, #ef4444);
      text-align: left;
    }
    
    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .btn {
      flex: 1;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      text-decoration: none;
    }
    
    .btn-primary {
      background: var(--color-primary, #0a0a0a);
      color: white;
      border: none;
    }
    
    .btn-secondary {
      background: white;
      color: var(--color-gray-700);
      border: 1px solid var(--color-gray-300);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="container header-inner">
        <a href="index.html" class="logo">
          <span class="logo-icon">S</span>
          Spreedly Web SDK
        </a>
        <span class="nav-badge">Processing Payment</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <div class="container">
        <div class="processing-container">
          <!-- Processing Card -->
          <div id="processing-card" class="processing-card">
            <div id="processing-icon" class="processing-icon loading">
              <div class="spinner-large"></div>
            </div>
            
            <h2 id="processing-title" class="processing-title">Processing Payment</h2>
            <p id="processing-message" class="processing-message">
              Please wait while we set up your payment...
            </p>
            
            <div id="progress-steps" class="progress-steps">
              <div id="step-1" class="progress-step active">
                <span class="step-icon active">1</span>
                <span>Payment method received</span>
              </div>
              <div id="step-2" class="progress-step">
                <span class="step-icon">2</span>
                <span>Creating purchase transaction</span>
              </div>
              <div id="step-3" class="progress-step">
                <span class="step-icon">3</span>
                <span>Redirecting to payment provider</span>
              </div>
            </div>
            
            <div id="error-section" class="hidden">
              <div id="error-details" class="error-details"></div>
              <div class="btn-group">
                <a href="./offsite-payments/index.html" class="btn btn-secondary">Try Again</a>
                <a href="./index.html" class="btn btn-primary">Back to Home</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container footer-inner">
        <span>Spreedly Web SDK Demo</span>
        <div class="footer-links">
          <a href="https://spreedly.com" target="_blank">Spreedly</a>
        </div>
      </div>
    </footer>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      // Get stored payment details from sessionStorage
      const amount = sessionStorage.getItem('offsite_payment_amount');
      const currency = sessionStorage.getItem('offsite_payment_currency') || 'USD';
      const paymentMethodType = sessionStorage.getItem('offsite_payment_method_type');
      
      // Clean up URL
      window.history.replaceState({}, document.title, window.location.pathname);
      
      if (!token) {
        showError('No payment method token received', 'The redirect from Spreedly did not include a payment method token.');
        return;
      }
      
      if (!amount) {
        showError('Missing payment amount', 'Please start the payment process from the beginning.');
        return;
      }
      
      console.log('Processing payment:', { token, amount, currency, paymentMethodType });
      
      // Update step 1 as completed
      updateStep(1, 'completed');
      updateStep(2, 'active');
      
      try {
        // Configure redirect and callback URLs
        const baseUrl = window.location.origin;
        const redirectUrl = `${baseUrl}/monorepo/offsite-payments/handle_redirect.html`;
        const callbackUrl = `${baseUrl}/monorepo/offsite-payments/handle_callback.html`;

        // const redirectUrl = 'https://example.com/handle_redirect'
        // const callbackUrl = 'https://example.com/handle_callback'
        
        // Store transaction info for the final redirect page
        sessionStorage.setItem('offsite_redirect_url', redirectUrl);
        
        // Call the purchase API
        document.getElementById('processing-message').textContent = 'Creating purchase transaction with payment provider...';
        
        const response = await SpreedlyUtils.createOffsitePurchase(
          token,
          parseInt(amount),
          redirectUrl,
          callbackUrl,
          currency
        );
        
        console.log('Purchase response:', response);
        
        // Store transaction token for status checking later
        if (response.transaction?.token) {
          sessionStorage.setItem('offsite_transaction_token', response.transaction.token);
        }
        
        // Update step 2 as completed
        updateStep(2, 'completed');
        updateStep(3, 'active');
        
        // Check if we have a checkout URL
        if (response.checkout_url) {
          document.getElementById('processing-message').textContent = 'Redirecting you to complete payment...';
          
          // Brief delay to show the message, then redirect
          setTimeout(() => {
            window.location.href = response.checkout_url;
          }, 1000);
        } else if (response.success) {
          // Transaction completed without redirect (unlikely for offsite)
          document.getElementById('processing-message').textContent = 'Payment completed!';
          setTimeout(() => {
            window.location.href = `./handle_redirect.html?transaction_token=${response.transaction?.token}`;
          }, 1000);
        } else {
          // Check if it's pending (needs redirect)
          if (response.state === 'pending') {
            showError('No checkout URL', 'The payment provider did not return a checkout URL. State: ' + response.state);
          } else {
            showError('Transaction failed', response.transaction?.message || 'Unknown error occurred');
          }
        }
      } catch (error) {
        console.error('Error creating purchase:', error);
        const errorMessage = error.response?.data?.error || error.response?.data?.details?.errors?.[0]?.message || error.message || 'An unknown error occurred';
        showError('Failed to create purchase', errorMessage);
      }
    });
    
    function updateStep(stepNum, status) {
      const step = document.getElementById(`step-${stepNum}`);
      const icon = step.querySelector('.step-icon');
      
      step.classList.remove('active', 'completed');
      icon.classList.remove('active', 'completed');
      
      if (status === 'active') {
        step.classList.add('active');
        icon.classList.add('active');
      } else if (status === 'completed') {
        step.classList.add('completed');
        icon.classList.add('completed');
        icon.innerHTML = '✓';
      }
    }
    
    function showError(title, message) {
      const card = document.getElementById('processing-card');
      const icon = document.getElementById('processing-icon');
      const titleEl = document.getElementById('processing-title');
      const messageEl = document.getElementById('processing-message');
      const progressSteps = document.getElementById('progress-steps');
      const errorSection = document.getElementById('error-section');
      const errorDetails = document.getElementById('error-details');
      
      card.classList.add('error');
      icon.classList.remove('loading');
      icon.classList.add('error');
      icon.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      `;
      
      titleEl.classList.add('error');
      titleEl.textContent = title;
      messageEl.textContent = 'An error occurred during payment processing.';
      
      progressSteps.classList.add('hidden');
      errorSection.classList.remove('hidden');
      errorDetails.textContent = message;
      
      // Clear sessionStorage
      sessionStorage.removeItem('offsite_payment_amount');
      sessionStorage.removeItem('offsite_payment_currency');
      sessionStorage.removeItem('offsite_payment_method_type');
    }
  </script>
</body>
</html>
