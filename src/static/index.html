<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spreedly Web SDK Sample App</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
  <div class="container">
    <main class="main-content">
      <div class="playground" data-testid="auth-playground">
        <div class="playground-header">
          <h2 class="playground-title">Spreedly Web SDK Playground</h2>
          <h3 class="auth-title">Auth Params</h3>
          <h3 class="auth-title" id="token-container-message" style="color: green"></h3>
        </div>

        <div class="auth-inputs-container" data-testid="auth-inputs-container">
          <div class="input-group" data-testid="input-group-env-key">
            <label for="env-key" class="input-label">Environment Key</label>
            <input type="text" id="env-key" name="env-key" class="auth-input" placeholder="Enter environment key"
              data-testid="input-env-key" />
          </div>

          <div class="input-group" data-testid="input-group-nonce">
            <label for="nonce" class="input-label">Nonce</label>
            <input type="text" id="nonce" name="nonce" class="auth-input" placeholder="Enter nonce value"
              data-testid="input-nonce" />
          </div>

          <div class="input-group" data-testid="input-group-timestamp">
            <label for="timestamp" class="input-label">Timestamp</label>
            <input type="text" id="timestamp" name="timestamp" class="auth-input" placeholder="Enter timestamp"
              data-testid="input-timestamp" />
          </div>

          <div class="input-group" data-testid="input-group-signature">
            <label for="signature" class="input-label">Signature</label>
            <input type="text" id="signature" name="signature" class="auth-input" placeholder="Enter signature"
              data-testid="input-signature" />
          </div>

          <div class="input-group" data-testid="input-group-token">
            <label for="token" class="input-label">Token</label>
            <input type="text" id="token" name="token" class="auth-input" placeholder="Enter token"
              data-testid="input-token" />
          </div>
        </div>
        <div class="json-input-section" data-testid="json-input-section">
          <label for="json-input" class="input-label">Auth Params JSON</label>
          <textarea id="json-input" name="json-input" class="json-textarea"
            placeholder="Paste your auth params JSON here..." data-testid="json-input" rows="6"></textarea>
          <button type="button" class="btn btn-parse" id="parse-btn" data-testid="btn-parse"
            onclick="parseAuthParams()">
            Parse JSON
          </button>
        </div>

        <div class="button-container" data-testid="button-container">
          <button type="button" class="btn btn-fetch-auth" id="fetch-auth-btn" data-testid="btn-fetch-auth"
            onclick="fetchAuthParams()">
            Fetch Auth Params
          </button>
          <button type="button" class="btn btn-express" id="express-btn" data-testid="btn-express"
            onclick="handleExpressClick()">
            Express
          </button>
          <button type="button" class="btn btn-hosted-fields" id="hosted-fields-btn" data-testid="btn-hosted-fields"
            onclick="handleHostedFieldsClick()">
            Hosted Fields
          </button>
        </div>
      </div>
    </main>
  </div>
  <script src="../dist/index.js"></script>
  <script src="../dist/script.js"></script>
  <script>
    // Function to fetch auth parameters from the API
    async function fetchAuthParams() {
      try {
        // Show loading state
        const messageElement = document.getElementById('token-container-message');
        messageElement.textContent = 'Fetching auth params...';
        messageElement.style.color = 'blue';

        // Make API call
        const response = await axios.get('/api/auth/get-auth-params', {
          headers: {
            // TODO: Get API key from environment variable
            'x-api-key': 'REDACTED_SAMPLE_UUID_2'
          }
        });
        const authParams = response.data;

        // Populate form fields
        document.getElementById('nonce').value = authParams.nonce || '';
        document.getElementById('timestamp').value = authParams.timestamp || '';
        document.getElementById('signature').value = authParams.signature || '';
        document.getElementById('token').value = authParams.certificateToken || '';

        // Populate JSON textarea
        document.getElementById('json-input').value = JSON.stringify(authParams, null, 2);

        // Show success message
        messageElement.textContent = 'Auth params loaded successfully!';
        messageElement.style.color = 'green';

      } catch (error) {
        console.error('Error fetching auth params:', error);

        // Show error message
        const messageElement = document.getElementById('token-container-message');
        messageElement.textContent = 'Error fetching auth params: ' + (error.response?.data?.message || error.message);
        messageElement.style.color = 'red';
      }
    }

    // Optional: Auto-fetch auth params when page loads
    document.addEventListener('DOMContentLoaded', function () {
      // Uncomment the line below if you want to auto-fetch on page load
      // fetchAuthParams();
    });
  </script>
</body>

</html>
