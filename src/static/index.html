<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spreedly Web SDK Sample App</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <div class="playground" data-testid="auth-playground">
          <div class="playground-header">
            <h2 class="playground-title">Spreedly Web SDK Playground</h2>
            <div class="button-container" data-testid="button-container">
              <button
                type="button"
                class="btn btn-express"
                id="express-btn"
                data-testid="btn-express"
                onclick="handleExpressClick()"
              >
                Express
              </button>
              <button
                type="button"
                class="btn btn-hosted-fields"
                id="hosted-fields-btn"
                data-testid="btn-hosted-fields"
                onclick="handleHostedFieldsClick()"
              >
                Hosted Fields
              </button>
            </div>
            <div class="options">
              <button
                type="button"
                class="btn btn-restart"
                id="restart-btn"
                data-testid="btn-restart"
                onclick="handleRestartClick()"
              >
                Restart
              </button>
              <label class="checkbox">
                <input
                  type="checkbox"
                  id="allow_blank_name"
                  data-testid="allow-blank-name"
                />
                Allow blank name
              </label>
              <label class="checkbox">
                <input
                  type="checkbox"
                  id="two_digit_expiry"
                  data-testid="two-digit-expiry"
                />
                Two digit expiry
              </label>
              <label class="checkbox">
                <input
                  type="checkbox"
                  id="allow_expired_date"
                  data-testid="allow-expired-date"
                />
                Allow expired date
              </label>
              <label class="checkbox">
                <input
                  type="checkbox"
                  id="retain_payment_method"
                  data-testid="retain-payment-method"
                />
                Retain payment method
              </label>
              <label class="checkbox">
                <input
                  type="checkbox"
                  id="open_in_embedded_mode"
                  data-testid="open-in-embedded-mode"
                />
                Open in Embedded mode
              </label>
            </div>
            <h3
              class="auth-title"
              id="token-container-message"
              style="color: green"
            ></h3>
          </div>

          <div
            class="auth-inputs-container"
            data-testid="auth-inputs-container"
          >
            <div class="input-group" data-testid="input-group-env-key">
              <label for="env-key" class="input-label">Environment Key</label>
              <input
                type="text"
                id="env-key"
                name="env-key"
                class="auth-input"
                placeholder="Enter environment key"
                data-testid="input-env-key"
                disabled
              />
            </div>

            <div class="input-group" data-testid="input-group-nonce">
              <label for="nonce" class="input-label">Nonce</label>
              <input
                type="text"
                id="nonce"
                name="nonce"
                class="auth-input"
                placeholder="Enter nonce value"
                data-testid="input-nonce"
                disabled
              />
            </div>

            <div class="input-group" data-testid="input-group-timestamp">
              <label for="timestamp" class="input-label">Timestamp</label>
              <input
                type="text"
                id="timestamp"
                name="timestamp"
                class="auth-input"
                placeholder="Enter timestamp"
                data-testid="input-timestamp"
                disabled
              />
            </div>

            <div class="input-group" data-testid="input-group-signature">
              <label for="signature" class="input-label">Signature</label>
              <input
                type="text"
                id="signature"
                name="signature"
                class="auth-input"
                placeholder="Enter signature"
                data-testid="input-signature"
                disabled
              />
            </div>

            <div class="input-group" data-testid="input-group-token">
              <label for="token" class="input-label">Token</label>
              <input
                type="text"
                id="token"
                name="token"
                class="auth-input"
                placeholder="Enter token"
                data-testid="input-token"
                disabled
              />
            </div>
          </div>
          <div class="json-input-section" data-testid="json-input-section">
            <label for="json-input" class="input-label">Auth Params JSON</label>
            <textarea
              id="json-input"
              name="json-input"
              class="json-textarea"
              placeholder="Paste your auth params JSON here..."
              data-testid="json-input"
              rows="2"
              disabled
            ></textarea>
          </div>
        </div>
        
        <!-- Saved Payment Methods Section -->
        <div class="saved-cards-section" id="saved-cards-section">
          <h3 class="saved-cards-title">Saved Payment Methods</h3>
          <div class="saved-cards-list" id="saved-cards-list">
          </div>
        </div>
        
        <div id="checkout-plugin-container"></div>
      </main>
    </div>
    <!-- <script src="./scripts/index.js"></script> -->
    <script src="https://core-test.spreedly.com/checkout/sdk/rc/index.js"></script>
    <script src="./scripts/script.js"></script>
    <script>
      async function fetchAuthParams() {
        try {
          document.getElementById('hosted-fields-btn').disabled = true;
          document.getElementById('express-btn').disabled = true;
          const response = await axios.get(
            'https://checkout-web-sample-app-049a3c617015.herokuapp.com/api/v1/auth/params'
          );
          const authParams = response.data;
          authParams['env-key'] = 'REDACTED_ENVIRONMENT_KEY';
          document.getElementById('env-key').value = authParams['env-key'];
          document.getElementById('nonce').value = authParams.nonce;
          document.getElementById('timestamp').value = authParams.timestamp;
          document.getElementById('signature').value = authParams.signature;
          document.getElementById('token').value = authParams.certificateToken;
          document.getElementById('json-input').value =
            JSON.stringify(authParams);
        } catch (error) {
          console.error('Error fetching auth params:', error);
        } finally {
          document.getElementById('hosted-fields-btn').disabled = false;
          document.getElementById('express-btn').disabled = false;
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        fetchAuthParams();
      });
    </script>
  </body>
</html>
